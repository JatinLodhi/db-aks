name: Terraform AKS Deployment

on:
  push:
    branches:
      - main   # → prod workspace
      - uat    # → uat workspace
      - dev    # → dev workspace
  pull_request:
    branches:
      - main
      - uat
      - dev
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - prod

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace name
        id: workspace
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            WS="${{ github.event.inputs.workspace }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            WS="prod"
          else
            WS="${{ github.ref_name }}"
          fi
          echo "name=$WS" >> $GITHUB_OUTPUT
          echo "Targeting workspace: $WS"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER_NAME }}" \
            -backend-config="access_key=${{ secrets.BACKEND_STORAGE_ACCESS_KEY }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Select Terraform Workspace
        run: |
          terraform workspace select ${{ steps.workspace.outputs.name }} 2>/dev/null \
            || terraform workspace new ${{ steps.workspace.outputs.name }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan-${{ steps.workspace.outputs.name }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.workspace.outputs.name }}
          path: ./tfplan-${{ steps.workspace.outputs.name }}
          retention-days: 5

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan 📋\n\n**Workspace:** \`${{ steps.workspace.outputs.name }}\`\n\nPlan generated. Review and approve to apply.`
            });

  approve-terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Resolve workspace name
        id: workspace
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.workspace }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Approval Gate
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: jatinlodhi2002
          minimum-approvals: 1
          issue-title: "Terraform Apply — workspace: ${{ steps.workspace.outputs.name }}"
          issue-body: |
            ## Terraform Apply Approval Required

            **Workspace:** `${{ steps.workspace.outputs.name }}`
            **Branch:** `${{ github.ref_name }}`
            **Commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}

            Resource Group: `aks-${{ steps.workspace.outputs.name }}-rg`
            Cluster: `aks-${{ steps.workspace.outputs.name }}-cluster`

            Comment `approve` to proceed or `deny` to cancel.

  terraform-apply:
    needs: approve-terraform-apply
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Resolve workspace name
        id: workspace
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.workspace }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER_NAME }}" \
            -backend-config="access_key=${{ secrets.BACKEND_STORAGE_ACCESS_KEY }}"

      - name: Select Terraform Workspace
        run: |
          terraform workspace select ${{ steps.workspace.outputs.name }} 2>/dev/null \
            || terraform workspace new ${{ steps.workspace.outputs.name }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ steps.workspace.outputs.name }}
          path: ./

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-${{ steps.workspace.outputs.name }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group aks-${{ steps.workspace.outputs.name }}-rg \
            --name aks-${{ steps.workspace.outputs.name }}-cluster \
            --overwrite-existing

      - name: Verify AKS Deployment
        run: |
          kubectl get nodes
          kubectl get namespaces

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Workspace:** ${{ steps.workspace.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** aks-${{ steps.workspace.outputs.name }}-rg" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** aks-${{ steps.workspace.outputs.name }}-cluster" >> $GITHUB_STEP_SUMMARY
          echo "✅ AKS cluster deployed successfully!" >> $GITHUB_STEP_SUMMARY
