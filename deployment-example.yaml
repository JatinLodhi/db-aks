apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    name: production
    environment: production

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
  labels:
    app: web-app
    tier: frontend
    version: v1
spec:
  replicas: 20  # Initial replicas, HPA will manage this
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%       # Maximum pods created during update
      maxUnavailable: 10% # Minimum availability during update
  selector:
    matchLabels:
      app: web-app
      tier: frontend
  template:
    metadata:
      labels:
        app: web-app
        tier: frontend
        version: v1
    spec:
      # Spread pods across availability zones
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: web-app
      # Anti-affinity to spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - web-app
              topologyKey: kubernetes.io/hostname
      containers:
      - name: web-app
        image: your-acr.azurecr.io/web-app:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        # Critical: Define resource requests and limits
        resources:
          requests:
            cpu: 200m      # 0.2 CPU cores
            memory: 256Mi  # 256 MiB RAM
          limits:
            cpu: 500m      # 0.5 CPU cores max
            memory: 512Mi  # 512 MiB RAM max
        # Readiness probe - pod receives traffic only when ready
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        # Liveness probe - pod restarted if unhealthy
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        # Startup probe - for apps with slow startup
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30  # 5 minutes to start
        env:
        - name: PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: app-config
        # Secrets (database credentials, API keys, etc.)
        - secretRef:
            name: app-secrets
        # Volume mounts (if needed)
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      # Volumes
      volumes:
      - name: config-volume
        configMap:
          name: app-config
      # Service account for pod identity
      serviceAccountName: web-app-sa
      # Security context for the pod
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      # Termination grace period
      terminationGracePeriodSeconds: 60

---
# Service for the deployment
apiVersion: v1
kind: Service
metadata:
  name: web-app-service
  namespace: production
  labels:
    app: web-app
spec:
  type: ClusterIP
  selector:
    app: web-app
    tier: frontend
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  sessionAffinity: None

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  app.properties: |
    server.port=8080
    app.name=web-app
    environment=production
  database.properties: |
    db.pool.size=20
    db.timeout=30000

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-app-sa
  namespace: production
  labels:
    app: web-app

---
# Example: API Service Deployment (backend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: production
  labels:
    app: api-service
    tier: backend
spec:
  replicas: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 30%
      maxUnavailable: 10%
  selector:
    matchLabels:
      app: api-service
      tier: backend
  template:
    metadata:
      labels:
        app: api-service
        tier: backend
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: api-service
      containers:
      - name: api-service
        image: your-acr.azurecr.io/api-service:v1.0.0
        ports:
        - containerPort: 8080
        # Higher resources for API processing
        resources:
          requests:
            cpu: 300m
            memory: 384Mi
          limits:
            cpu: 1000m  # 1 CPU core
            memory: 768Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: JAVA_OPTS
          value: "-Xms256m -Xmx512m"
        - name: ENABLE_METRICS
          value: "true"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
      terminationGracePeriodSeconds: 90

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: api-service
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
